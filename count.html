<script>
var answer = "Wrong!";
var totalCircles = 1;
function circleAppear() {
	document.getElementById("afterSubmit").style.display = 'none';
	document.getElementById("begin").style.display = 'none';
	var doneAlready = [];
	totalCircles = Math.floor((Math.random() * 15) + 1);
	console.log("circles = " + totalCircles);	
	var circlenum = 20;
	var divID = "";
	var i = 0;
	var j = 0;
	var alreadyCheck = false;
	while (i < totalCircles) {
		if (Math.random() < 0.5) {
			console.log("We chose " + j);
			for(q = 0; q < doneAlready.length; q++){
				if (doneAlready[q] == j){
				alreadyCheck = true
				console.log("but it's been done already");
				}
				
			}
			if (alreadyCheck == false){
				divID = "circle" + j;
				doneAlready.push(j);
				console.log("and made " + divID + " appear!");
				appear(divID);
				i++
			}
			alreadyCheck = false;
				
		}
	if (j < 19){
		j++
		} 
		else {j = 0}
	console.log("j = " + j);
	}
	
	

}
function isNumber(evt) {
    evt = (evt) ? evt : window.event;
    var charCode = (evt.which) ? evt.which : evt.keyCode;
	if (charCode == 13) {checkNumber(parseInt(document.getElementById('inputNumber').value))}
    if (charCode > 31 && (charCode < 48 || charCode > 57)) {
        return false;
    }

	return true;
	
}
function fade(element) {
    var op = 1;  // initial opacity
    var timer = setInterval(function () {
        if (op <= 0.1){
            clearInterval(timer);
            document.getElementById(element).style.visibility = 'hidden'; 
			document.getElementById("howMany").style.display = 'inline';
			document.getElementById("inputNumber").focus();
        }
        document.getElementById(element).style.opacity = op;
        document.getElementById(element).style.filter = 'alpha(opacity=' + op * 100 + ")";
        op -= op * 0.5;
    }, 50);
}
function appear(element) {
	console.log("appear begin");
	document.getElementById(element).style.visibility = 'visible';
    var op = 0.1;  // initial opacity
	document.getElementById(element).style.filter = 'alpha(opacity=' + op * 100 + ")";
	 
    var timer = setInterval(function () {
		if (op >= 1){
			console.log("appear" + element + "end");
            clearInterval(timer);
			fade(element);

        }
        document.getElementById(element).style.opacity = op;
        document.getElementById(element).style.filter = 'alpha(opacity=' + op * 100 + ")";
        op += op * 3;
    }, 50);
}

function checkNumber(numberIn){

if (numberIn == totalCircles) {
	answer = "Correct!";
}
else {
	answer = "Wrong!";
	}
document.getElementById("inputNumber").value = "";
document.getElementById("correct").innerHTML = answer;
document.getElementById("answer").innerHTML = totalCircles;
document.getElementById("afterSubmit").style.display = 'inline';
document.getElementById("howMany").style.display = 'none';
document.getElementById("again").focus();

}
</script>
