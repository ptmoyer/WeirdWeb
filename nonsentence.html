<script>
    var talkElement;
    var timeoutArray = [];
    window.onload = function() {
        showNewSentence();
    };

    function showNewSentence()
    {   
        talkElement = document.getElementById("mouth1");
        talkElement.classList.add("talking");
        timeoutArray.forEach(stopTimer);
        timeoutArray = [];
        var tweetLinkStart = "https://twitter.com/intent/tweet?hashtags=nonSentence&original_referer=https%3A%2F%2Fphillipmoyer.com%2F&ref_src=twsrc%5Etfw&related=phillipmoyer&text=";
        var tweetLinkEnd = "&tw_p=tweetbutton&url=https%3A%2F%2Fphillipmoyer.com%2Fnonsentence.html"
        var tweetButton = document.getElementById('customTweet');
        var showArea = document.getElementById('replaceText');
        var finishedSentence = makeASentence();
        showArea.innerHTML = "";
        tweetButton.setAttribute("href", tweetLinkStart + finishedSentence + tweetLinkEnd);
        displaySentence(showArea, finishedSentence);
        
    };
    function stopTimer(item, index)
    {
        clearTimeout(item);
    }
    function displaySentence(targetDiv, textGet)
    {
        var charArray = [];
        var pauseTotal = 0;
            for (i = 0; i < textGet.length; i++)
            {
                delayShow(textGet.charAt(i), targetDiv, pauseTotal);
                if (textGet.charAt(i+1)==" "){
                    pauseTotal += 5;
                }
                else
                {
                    pauseTotal += (Math.floor(Math.random()*35) + 20);
                }
            }
        stopTalking(pauseTotal); //sends total timer. Stops the talkElement from talking.
        
    }
    
    function stopTalking(talkTimer)
    {
        setTimeout(function(){talkElement.classList.remove("talking")},talkTimer);
    }
    
    function delayShow(theChar, theDiv, theTime)
        {
            timeoutArray.push(setTimeout(function(){theDiv.insertAdjacentText("beforeend", theChar)}, theTime)); 
            //added to an array so that the "stopTimer" function can stop every timer.
            //not sure why "afterend makes this go backwards -- look into exact function of insertAdjacentText"
            //if ends up breaking later switch to either node.appendChild or theDiv.innerHTML+=
            
            
            
        }
    
    function makeASentence()
    {
        
        var stringToShow = randomSentenceType();
        return stringToShow;
    };
    
    
    function randomSentenceType()
        {
          var stringToShow = classicSentence();
           return stringToShow;
        }
    
    function classicSentence()
        {
        var adj1 = arrayChooser(adjective);
        firstAdj = wordCap(adj1);
        var adj2 = arrayChooser(adjective);
        var adverbToShow = arrayChooser(adverb);
        var verbToShow = arrayChooser(pluralVerb);
        var nounToShow = arrayChooser(pluralNoun);
        var stringToShow = firstAdj + " " + adj2 + " " + nounToShow + " " + verbToShow + " " + adverbToShow + ".";
        return stringToShow;
        }
    
    function arrayChooser(wordType)     
    {
        console.log('start')
        var wordNum = Math.floor(Math.random()*wordType.length)
        var wordChosen = wordType[wordNum];
        console.log('chose ' + wordChosen)
        return wordChosen;
    };
    function wordCap (wordToCapitalize)
    {
        return wordToCapitalize.charAt(0).toUpperCase() + wordToCapitalize.slice(1);
    };
    
</script>
